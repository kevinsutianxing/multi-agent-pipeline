name: repository-tests

on:
  push:
    paths:
      - 'implementation/**'
      - 'Makefile'
      - '.github/workflows/implementation-tests.yml'
  pull_request:
    paths:
      - 'implementation/**'
      - 'Makefile'
      - '.github/workflows/implementation-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run canonical repository checks
        run: make test PYTHON=python
