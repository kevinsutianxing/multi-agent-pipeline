name: implementation-tests

on:
  push:
    paths:
      - 'implementation/**'
      - '.github/workflows/implementation-tests.yml'
  pull_request:
    paths:
      - 'implementation/**'
      - '.github/workflows/implementation-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile
        run: python -m compileall -q implementation/scripts implementation/plugins implementation/tests
      - name: Unit and isolated integration tests
        run: python -m unittest discover -s implementation/tests -v
      - name: Shell syntax
        run: bash -n implementation/deploy/*.sh
