name: Research Gates

on:
  pull_request:
    paths:
      - "scripts/**"
      - "schemas/**"
      - "tests/**"
      - "loop/**"
      - "prompts/**"
      - "docs/**"
      - ".github/workflows/research-gates.yml"
  push:
    branches: [master]
    paths:
      - "scripts/**"
      - "schemas/**"
      - "tests/**"
      - "loop/**"
      - "prompts/**"
      - "docs/**"
      - ".github/workflows/research-gates.yml"

permissions:
  contents: read

jobs:
  test-research-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependency
        run: python -m pip install --disable-pip-version-check pytest
      - name: Compile deterministic gates
        run: python -m py_compile scripts/merge_manifests.py scripts/validate_evidence.py
      - name: Validate JSON schemas
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in sorted(Path('schemas').glob('*.json')):
              json.loads(path.read_text(encoding='utf-8'))
              print(f'validated {path}')
          PY
      - name: Run research gate tests
        run: python -m pytest -q tests/test_research_gates.py
